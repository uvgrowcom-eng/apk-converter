<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>APK to AAB Converter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial;
            background: #0f0f1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 24px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #fff;
            text-align: center;
        }

        h1 span {
            background: linear-gradient(135deg, #00d4ff, #7b2ffc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .info {
            color: #8899bb;
            text-align: center;
            margin: 10px 0 20px;
        }

        input[type="file"] {
            display: block;
            margin: 15px 0;
            padding: 12px;
            border: 2px dashed #444;
            border-radius: 12px;
            width: 100%;
            background: transparent;
            color: #fff;
        }

        input[type="number"] {
            width: 48%;
            padding: 10px;
            margin: 10px 1%;
            border: 1px solid #333;
            border-radius: 8px;
            background: transparent;
            color: #fff;
            display: inline-block;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00d4ff, #7b2ffc);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            display: none;
            color: #fff;
        }

        .success {
            background: rgba(0, 255, 100, 0.1);
            border: 1px solid rgba(0, 255, 100, 0.2);
            display: block;
        }

        .error {
            background: rgba(255, 50, 50, 0.1);
            border: 1px solid rgba(255, 50, 50, 0.2);
            display: block;
        }

        .loading {
            background: rgba(0, 212, 255, 0.08);
            border: 1px solid rgba(0, 212, 255, 0.15);
            display: block;
        }

        #progress {
            margin-top: 10px;
            background: #222;
            border-radius: 20px;
            overflow: hidden;
            display: none;
            height: 6px;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #7b2ffc);
            transition: width 0.5s;
        }

        a {
            color: #66ddff;
            text-decoration: none;
            display: inline-block;
            margin: 5px 0;
        }

        a:hover {
            text-decoration: underline;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: #445566;
            font-size: 12px;
        }

        .download-section {
            margin: 10px 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>📱 <span>APK → AAB</span></h1>
        <p class="info">Convert APK to Android App Bundle</p>
        <form id="uploadForm" enctype="multipart/form-data">
            <input type="file" name="apk" accept=".apk" required>
            <div>
                <input type="number" name="minSdk" value="21" placeholder="Min SDK">
                <input type="number" name="targetSdk" value="33" placeholder="Target SDK">
            </div>
            <button type="submit" id="btn">🚀 Convert</button>
        </form>
        <div id="progress">
            <div id="progress-bar"></div>
        </div>
        <div id="status"></div>
        <div class="footer">Powered by Python + Render</div>
    </div>
    <script>
        const form = document.getElementById('uploadForm');
        const status = document.getElementById('status');
        const progress = document.getElementById('progress');
        const bar = document.getElementById('progress-bar');
        const btn = document.getElementById('btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const fd = new FormData(form);
            status.className = 'loading';
            status.textContent = '⏳ Converting... (2-5 min)';
            status.style.display = 'block';
            progress.style.display = 'block';
            bar.style.width = '0%';
            btn.disabled = true;

            try {
                let p = 0;
                const intv = setInterval(() => { p += 5; if (p <= 90) bar.style.width = p + '%'; }, 500);
                const res = await fetch('/api/convert', { method: 'POST', body: fd });
                clearInterval(intv);
                bar.style.width = '100%';
                const data = await res.json();

                if (res.ok && data.success) {
                    let html = `✅ <strong>Done!</strong><br>`;
                    html += `<div class="download-section">`;
                    html += `<a href="${data.download_url}" download>📥 Download AAB</a> (${(data.size / 1024 / 1024).toFixed(1)} MB)<br>`;

                    if (data.apks_download_url) {
                        html += `<a href="${data.apks_download_url}" download>📥 Download APKS</a><br>`;
                    }

                    if (data.universal_apk_download_url) {
                        html += `<a href="${data.universal_apk_download_url}" download>📥 Download Universal APK</a>`;
                    }

                    html += `</div>`;
                    status.className = 'success';
                    status.innerHTML = html;
                } else {
                    status.className = 'error';
                    status.textContent = '❌ ' + (data.error || 'Error');
                }
            } catch (err) {
                status.className = 'error';
                status.textContent = '❌ ' + err.message;
            } finally {
                btn.disabled = false;
                setTimeout(() => { progress.style.display = 'none'; }, 2000);
            }
        });
    </script>
</body>

</html>
